<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Boshqaruv</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #1a1a2e; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            margin: 0;
        }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #00ffcc; border-bottom: 2px solid #00ffcc; padding-bottom: 10px; }
        
        .back-btn { 
            display: inline-block; 
            color: #00ffcc; 
            text-decoration: none; 
            margin-bottom: 20px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover { transform: translateX(-5px); }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #00ffcc; color: #1a1a2e; text-transform: uppercase; font-size: 14px; }
        tr:hover { background: rgba(0, 255, 204, 0.05); }

        .role-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .role-admin { background: #00ffcc; color: #1a1a2e; }
        .role-user { background: #555; color: white; }

        .del-btn { 
            color: #ff4d4d; 
            text-decoration: none; 
            background: rgba(255, 77, 77, 0.1);
            padding: 8px 12px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .del-btn:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Chatga qaytish</a>
        <h1><i class="fas fa-user-shield"></i> Tizim Boshqaruvi</h1>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Foydalanuvchi</th>
                    <th>Email</th>
                    <th>Yosh</th>
                    <th>Rol</th>
                    <th>Amal</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td>
                    <td><b>{{ user[1] }}</b></td>
                    <td>{{ user[2] }}</td>
                    <td>{{ user[3] }}</td>
                    <td>
                        <span class="role-badge {% if user[4] == 'admin' %}role-admin{% else %}role-user{% endif %}">
                            {{ user[4] }}
                        </span>
                    </td>
                    <td>
                        <a href="/delete_user/{{ user[0] }}" class="del-btn" onclick="return confirm('Haqiqatdan ham bu foydalanuvchini o\'chirmoqchimisiz?')">
                            <i class="fas fa-trash-can"></i> O'chirish
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
