<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart System | Kirish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #1A120B;
            --card-brown: #3C2A21;
            --text-light: #E5E5E5;
            --accent-green: #00E676;
            --accent-gold: #FFD700;
            --glass-bg: rgba(30, 30, 30, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--card-brown) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .hero-container {
            display: flex;
            max-width: 1100px;
            width: 95%;
            background: var(--glass-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
        }

        /* Chap tomon: Ma'lumot qismi */
        .hero-info {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        .headline {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 30px;
            color: #fff;
        }

        .headline span { color: var(--accent-gold); }

        .features { list-style: none; }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 17px;
            margin-bottom: 22px;
            color: rgba(229, 229, 229, 0.9);
        }

        .feature-item i { color: var(--accent-green); font-size: 20px; width: 25px; }

        /* O'ng tomon: Kirish qismi */
        .hero-auth {
            flex: 1;
            background-color: rgba(60, 42, 33, 0.8);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(255,255,255,0.05);
        }

        .auth-form h2 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            color: var(--accent-gold);
        }

        .input-box { margin-bottom: 20px; }

        .input-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .input-box input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 18px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus { border-color: var(--accent-green); }

        .btn-submit {
            width: 100%;
            background: var(--accent-green);
            color: #121212;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3); }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }

        .auth-footer a { color: var(--accent-green); text-decoration: none; font-weight: 600; }

        @media (max-width: 900px) {
            .hero-container { flex-direction: column; }
            .hero-auth { border-left: none; border-top: 1px solid rgba(255,255,255,0.05); }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="hero-info">
            <div class="logo">
                <i class="fas fa-layer-group"></i> Smart System
            </div>
            
            <h1 class="headline">
                Loyihalaringiz uchun <span>yagona boshqaruv</span> muhiti
            </h1>

            <ul class="features">
                <li class="feature-item">
                    <i class="fas fa-check-circle"></i>
                    Vazifalar nazorati — Rejalarni tartibga soling
                </li>
                <li class="feature-item">
                    <i class="fas fa-shield-alt"></i>
                    Xavfsizlik — Ma'lumotlar maxfiy saqlanadi
                </li>
                <li class="feature-item">
                    <i class="fas fa-bolt"></i>
                    Tezkorlik — Sifatli va optimallashgan tizim
                </li>
            </ul>
        </div>

        <div class="hero-auth">
            <div class="auth-form">
                <h2>Tizimga kirish</h2>
                <form action="/auth" method="POST">
                    <div class="input-box">
                        <label>Foydalanuvchi nomi</label>
                        <input type="text" name="nickname" placeholder="Nickname" required>
                    </div>
                    <div class="input-box">
                        <label>E-mail manzili</label>
                        <input type="email" name="email" placeholder="example@mail.com" required>
                    </div>
                    <div class="input-box">
                        <label>Parol</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">
                        Kirish <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                <div class="auth-footer">
                    Hisobingiz yo'qmi? <a href="/login_page">Ro'yxatdan o'tish</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
